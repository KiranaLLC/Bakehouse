<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
  <script src="./script.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <img src="./img/kirana_cream_logo.svg" alt="Kirana logo in cream colour" class="logo-image" />
      </div>

      <nav class="desktop-nav" aria-label="Primary navigation">
        <a href="#" data-link-key="subscribe" class="subscribe-btn">Join Now</a>
      </nav>

      <button class="hamburger" id="hamburger" aria-label="Toggle mobile menu" aria-controls="mobileMenu" aria-expanded="false" type="button">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

    <nav class="mobile-menu" id="mobileMenu" aria-label="Mobile navigation">
      <a href="#" data-link-key="subscribe" class="subscribe-btn mobile">Join Now</a>
    </nav>
  </header>

  <main class="page">
    <section class="cover" id="menu">
      <img src="./img/CoverImage.png" alt="Kirana Bakehouse" />
    </section>

    <section class="concept" id="concept">
      <img src="./img/concept.png" alt="Our concept" />
    </section>
  <section class="concept" id="menu_ss">
      <img src="./img/classic_ss.png" alt="Spring/Summer Classics" />
    </section>
     <section class="concept" id="menu_ss">
      <img src="./img/inclusions_ss.png" alt="Spring/Summer Inclusions" />
    </section> 

    <footer class="footer">
      <div>© 2026 Kirana</div>
      <a
        href="#"
        data-link-key="instagram"
        data-external="true"
        class="instagram-link"
      >
        @kiranabakehouse
      </a>
    </footer>
  </main>
</body>
</html>
